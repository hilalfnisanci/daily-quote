<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Daily Quote</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="A daily dose of inspiration — random quotes delivered fresh every visit.">
  <link rel="icon" href="data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 100 100%22><text y=%22.9em%22 font-size=%2290%22>⭐</text></svg>">
  <link rel="stylesheet" href="styles.css">
</head>
<body>
  <main>
    <nav id="tab-nav">
      <button class="tab-btn active" data-tab="daily">Daily Quote</button>
      <button class="tab-btn" data-tab="favorites">My Favorites</button>
    </nav>

    <div id="view-daily">
      <div id="daily-header">
        <h1>Daily Quote</h1>
        <button id="heart-btn" aria-label="Add to favorites" title="Toggle favorite">♡</button>
      </div>
      <div id="category-filter">
        <label for="category-select" class="sr-only">Filter by category</label>
        <select id="category-select">
          <option value="all">All categories</option>
          <option value="motivation">Motivation</option>
          <option value="success">Success</option>
          <option value="wisdom">Wisdom</option>
          <option value="life">Life</option>
          <option value="happiness">Happiness</option>
        </select>
      </div>
      <div id="loading-spinner"></div>
      <p id="quote-text"></p>
      <span id="quote-category" class="hidden"></span>
      <p id="quote-author"></p>
      <button id="copy-btn">Copy to clipboard</button>
    </div>

    <div id="view-favorites" class="hidden">
      <h2>My Favorites</h2>
      <p id="favorites-empty">No favorites yet. Click ♡ on a quote to save it here.</p>
      <ul id="favorites-list"></ul>
    </div>

    <footer>© 2026 Daily Quote</footer>
  </main>
  <script src="app.js"></script>
</body>
</html>
